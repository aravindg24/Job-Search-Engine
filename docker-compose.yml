version: '3.9'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rolegpt-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rolegpt-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - USE_MEMORY_QDRANT=false
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rolegpt-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
